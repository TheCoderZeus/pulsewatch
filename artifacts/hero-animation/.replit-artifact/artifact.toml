kind = "video"
previewPath = "/hero-animation/"
title = "Team Collaboration Hero Animation"
version = "1.0.0"
id = "artifacts/hero-animation"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/hero-animation/" ]
localPort = 25846

[services.development]
run = "pnpm --filter @workspace/hero-animation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hero-animation", "run", "build" ]
publicDir = "artifacts/hero-animation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25846"
BASE_PATH = "/hero-animation/"
